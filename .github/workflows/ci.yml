name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace --locked

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.90"
      - run: cargo check --workspace --all-targets --locked

  # Installs the real `compact` CLI and runs the toolchain-gated integration
  # tests end-to-end (compile-on-save + formatting). The default `test`
  # matrix above runs WITHOUT the toolchain, so those tests self-skip there
  # via `Toolchain::discover(None).is_none()`; this is the one job where the
  # real compiler is exercised as an oracle.
  toolchain:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      # Official non-interactive installer (cargo-dist generated), verified
      # by reading the script itself: with no COMPACT_INSTALL_DIR/XDG vars
      # set (the default GitHub-hosted runner), it installs the `compact`
      # launcher binary to `$HOME/.local/bin`. The script also auto-appends
      # that directory to $GITHUB_PATH when it detects it's running in
      # GitHub Actions; we still add it explicitly below so this job doesn't
      # depend on that undocumented installer-internal behavior.
      - name: Install compact CLI
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/midnightntwrk/compact/releases/latest/download/compact-installer.sh | sh

      - name: Add compact CLI to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # Pin the compiler to the exact version the gated tests were written
      # and empirically verified against (compiler 0.31.1 / language
      # 0.23.0 — see crates/compact-analyzer/tests/lsp_toolchain.rs and
      # crates/analyzer-toolchain/src/compile.rs), rather than tracking
      # `compact update`'s unpinned "latest". `compact update <version>` is
      # documented to accept an exact version and is non-interactive, so
      # pinning is cleanly supported — this keeps the job deterministic and
      # immune to a future compiler release (e.g. language 0.24) silently
      # breaking these fixtures. Bump this version (and the fixtures) as a
      # deliberate, reviewed change, not as a side effect of upstream drift.
      - name: Install compact compiler 0.31.1
        run: compact update 0.31.1

      - name: Verify installed toolchain versions
        run: |
          compact --version
          compact compile --version
          compact compile --language-version
          test "$(compact compile --language-version)" = "0.23.0"

      - run: cargo test -p analyzer-toolchain --locked
      - run: cargo test -p compact-analyzer --test lsp_toolchain --locked

  # Builds, checks, and smoke-packages the VS Code extension. Node 22 is used
  # deliberately — NOT the extension's 20.19 runtime floor (`engines.node`) —
  # because the dev-time test tooling (@vscode/test-cli / @vscode/test-electron)
  # declares `engines.node >= 22`; `npm ci` on Node 22 installs it cleanly.
  extension:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run lint
      - run: npm run check
      - run: npm test
      - run: npm run build
      # `--no-dependencies`: the runtime dependency is inlined into dist/ by
      # esbuild, so vsce must not walk node_modules.
      - run: npx vsce package --no-dependencies

  # Runs the activation smoke E2E in a real VS Code host under Xvfb. Node 22 is
  # required for the same reason as the `extension` job. The E2E resolves the
  # server via `serverPath` = the freshly built debug binary (the harness throws
  # a clear error if it is absent), so the Rust build runs before the E2E.
  extension-e2e:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # Xvfb (the virtual display the headless VS Code host renders into) plus
      # the shared libraries the VS Code/Electron test host needs on a headless
      # ubuntu-24.04 runner. The t64-suffixed names are the 64-bit-time_t
      # packages that supersede the pre-transition libgtk-3-0/libasound2 on
      # 24.04 — the old names have no install candidate there.
      - name: Install VS Code test-host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libnspr4 libgbm1 libgtk-3-0t64 libasound2t64
      # The E2E harness (.vscode-test.mjs) points `serverPath` at this binary.
      - name: Build the language server (debug)
        run: cargo build -p compact-analyzer --locked
      - name: Install extension dependencies
        working-directory: editors/vscode
        run: npm ci
      - name: Run the activation E2E under Xvfb
        working-directory: editors/vscode
        run: xvfb-run -a npm run test:e2e
